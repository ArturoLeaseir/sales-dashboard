<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Sales Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;font-size:15px;padding-bottom:24px}
.header{background:#fff;border-bottom:1px solid #e5e5e0;padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:16px;font-weight:600}
.header-sub{font-size:11px;color:#888;margin-top:1px}
.period-bar{background:#fff;border-bottom:1px solid #f0f0ec;padding:8px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;position:sticky;top:57px;z-index:99}
.period-bar::-webkit-scrollbar{display:none}
.pb{padding:5px 12px;border-radius:20px;border:1px solid #e5e5e0;background:#fff;font-size:12px;cursor:pointer;color:#555;white-space:nowrap;flex-shrink:0}
.pb.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.comm-bar{background:#fff;border-bottom:1px solid #f0f0ec;padding:7px 12px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.comm-bar::-webkit-scrollbar{display:none}
.cb{padding:4px 10px;border-radius:20px;border:1px solid #e5e5e0;background:#fff;font-size:11px;cursor:pointer;color:#555;white-space:nowrap;flex-shrink:0}
.cb.active{background:#378ADD;color:#fff;border-color:#378ADD}
.content{padding:12px}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kcard{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #e5e5e0}
.kcard.wide{grid-column:span 2}
.kcard.pipe{border-color:#f97316;background:#fff7ed}
.kcard.budg{border-color:#8B5CF6;background:#faf5ff}
.klbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.kval{font-size:22px;font-weight:600;color:#1a1a18;line-height:1}
.ksub{font-size:11px;color:#aaa;margin-top:3px}
.cc{background:#fff;border-radius:10px;border:1px solid #e5e5e0;padding:14px;margin-bottom:12px}
.ctitle{font-size:13px;font-weight:600;margin-bottom:4px}
.csub{font-size:11px;color:#aaa;margin-bottom:10px}
.cleg{display:flex;gap:10px;margin-bottom:8px;font-size:11px;color:#888}
.leg{display:flex;align-items:center;gap:4px}
.ldot{width:9px;height:9px;border-radius:2px}
/* Table */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 8px;border-bottom:2px solid #e5e5e0;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#888;font-weight:600;white-space:nowrap;background:#fff;position:sticky;top:0}
td{padding:8px 8px;border-bottom:1px solid #f0f0ec;color:#1a1a18;white-space:nowrap}
td.n{text-align:right;font-variant-numeric:tabular-nums}
/* Hierarchical rows */
tr.rc td{background:#f0f0ed;font-weight:600;font-size:12px;cursor:pointer}
tr.rc td:first-child::before{content:'▶ ';font-size:9px;color:#888}
tr.rc.open td:first-child::before{content:'▼ ';font-size:9px;color:#888}
tr.rp td{background:#f8f8f6;cursor:pointer}
tr.rp td:nth-child(2)::before{content:'▶ ';font-size:9px;color:#aaa}
tr.rp.open td:nth-child(2)::before{content:'▼ ';font-size:9px;color:#aaa}
tr.rk td:nth-child(3){padding-left:16px;font-size:11px}
.badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500}
.bs{background:#e8f3ff;color:#185FA5}
.br{background:#eaf3de;color:#3B6D11}
.bp{background:#ffedd5;color:#c2410c}
.bbudg{color:#6D28D9;font-weight:500}
.bon{color:#16a34a;font-weight:600}
.boff{color:#dc2626;font-weight:600}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Sales Dashboard</div>
    <div class="header-sub" id="hdr-sub">Cargando...</div>
  </div>
</div>

<div class="period-bar" id="period-bar">
  <button class="pb active" onclick="sp('all',this)">Todo</button>
  <button class="pb" onclick="sp('2024',this)">2024</button>
  <button class="pb" onclick="sp('2025',this)">2025</button>
  <button class="pb" onclick="sp('2026',this)">2026</button>
  <button class="pb" onclick="sp('curmonth',this)">Mes actual</button>
  <button class="pb" onclick="sp('lastmonth',this)">Últ. mes</button>
  <button class="pb" onclick="sp('lastq',this)">Últ. trim.</button>
</div>

<div class="comm-bar" id="comm-bar"></div>

<div class="content">

  <!-- KPIs -->
  <div class="kgrid" id="kpis"></div>

  <!-- Chart -->
  <div class="cc">
    <div class="ctitle">Unidades por mes</div>
    <div class="cleg">
      <div class="leg"><div class="ldot" style="background:#378ADD"></div>Venta</div>
      <div class="leg"><div class="ldot" style="background:#1D9E75"></div>Renting</div>
    </div>
    <div style="position:relative;height:200px"><canvas id="main-chart"></canvas></div>
  </div>

  <!-- Table -->
  <div class="cc">
    <div class="ctitle">Comercial · País · Cliente</div>
    <div class="csub">Toca una fila para expandir</div>
    <div class="tw">
      <table>
        <thead><tr>
          <th>Comercial</th><th>País</th><th>Cliente</th>
          <th class="n">Uds</th><th class="n">Presup.</th>
          <th class="n">Ventas</th><th class="n">Rent.</th><th class="n">Pipeline</th>
        </tr></thead>
        <tbody id="main-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

function fmt(v){if(!v||v===0)return'—';if(v>=1e6)return(v/1e6).toFixed(1)+'M€';if(v>=1e3)return Math.round(v/1e3)+'K€';return Math.round(v)+'€';}
function fmtN(v){return(!v&&v!==0)?'—':Math.round(v).toLocaleString();}
function fmtMi(v){if(!v||v===0)return'—';return Math.round(v)+'€/m';}
function esc(s){return String(s).replace(/"/g,'&quot;');}
function fmtBudg(v){if(!v||v===0)return'<span style="color:#ccc">—</span>';return'<span class="bbudg">'+v+'</span>';}

function fr(rows,p){
  if(!rows||!rows.length)return[];
  if(p==='all')return rows;
  if(['2024','2025','2026'].includes(p))return rows.filter(r=>r.y===p);
  if(p==='curmonth')return rows.filter(r=>r.y===String(NOW_Y)&&r.m===NOW_M);
  if(p==='lastmonth'){let m=NOW_M-1,y=NOW_Y;if(m<1){m=12;y--;}return rows.filter(r=>r.y===String(y)&&r.m===m);}
  if(p==='lastq'){const ms=[];let m=NOW_M,y=NOW_Y;for(let i=0;i<3;i++){m--;if(m<1){m=12;y--;}ms.push({y:String(y),m});}return rows.filter(r=>ms.some(x=>x.y===r.y&&x.m===r.m));}
  return rows;
}

function agg(rows){
  const sales=rows.filter(r=>!r.r),rents=rows.filter(r=>r.r);
  return{units:rows.length,rev:rows.reduce((s,r)=>s+r.s,0),sales:sales.length,rents:rents.length,
    avgSale:sales.length?sales.reduce((s,r)=>s+r.s,0)/sales.length:null,
    avgRent:rents.length?rents.reduce((s,r)=>s+r.mi,0)/rents.length:null};
}

function getB26(comm,ctry,cust){
  const exact=BUDGET.find(b=>b.comm===comm&&b.ctry===ctry&&b.cust===cust);
  return exact?exact.b2026:0;
}
function getAggB26(dim,k1,k2){
  return BUDGET.filter(b=>{
    if(dim==='comm')return b.comm===k1;
    if(dim==='ctry')return b.ctry===k1;
    if(dim==='comm+ctry')return b.comm===k1&&b.ctry===k2;
    return false;
  }).reduce((s,b)=>s+b.b2026,0);
}
function pipeFor(dim,val){return PIPE.filter(r=>r[dim]===val).length;}

        const cuPipe=cpd[cu]||0;
        const cuBudg=getB26(c,ct,cu);
        html+='<tr class="rk" data-parent="'+ptid+'" style="display:none">'+
          '<td></td><td></td><td>'+cu+'</td>'+
          '<td class="n">'+fmtN(cua.units)+'</td>'+
          '<td class="n">'+fmtBudg(cuBudg)+'</td>'+
          '<td class="n"><span class="badge bs">'+cua.sales+'</span></td>'+
          '<td class="n"><span class="badge br">'+cua.rents+'</span></td>'+
          '<td class="n">'+(cuPipe>0?'<span class="badge bp">'+cuPipe+'</span>':'—')+'</td>'+
          '</tr>';
      });
    });
  });
  document.getElementById('main-tbody').innerHTML=html;
}

function tog(tr,gid){
  const children=document.querySelectorAll('[data-parent="'+gid+'"]');
  const isOpen=tr.classList.contains('open');
  if(isOpen){
    function hide(g){document.querySelectorAll('[data-parent="'+g+'"]').forEach(r=>{r.style.display='none';r.classList.remove('open');if(r.dataset.group)hide(r.dataset.group);});}
    hide(gid);tr.classList.remove('open');
  } else {
    children.forEach(r=>r.style.display='');tr.classList.add('open');
  }
}

function sp(p,btn){
  CUR_PERIOD=p;
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setComm(comm,btn){
  CUR_COMM=comm;
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function buildCommBtns(){
  const comms=Object.keys(DATA.commercial).sort();
  document.getElementById('comm-bar').innerHTML=
    '<button class="cb active" onclick="setComm('',this)">Todos</button>'+
    comms.map(c=>'<button class="cb" onclick="setComm('+JSON.stringify(c)+',this)">'+c+'</button>').join('');
}

window.addEventListener('load',()=>{
  buildCommBtns();
  render();
});
</script>
</body>
</html>
